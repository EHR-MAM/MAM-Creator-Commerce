name: CI

on:
  pull_request:
    branches: [main, develop]
  push:
    branches: [main]

jobs:
  backend:
    name: Backend — Lint, Type Check, Test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt aiosqlite ruff mypy pytest pytest-asyncio

      - name: Lint (ruff)
        run: ruff check .

      - name: Type check (mypy)
        run: mypy app --ignore-missing-imports

      - name: Run tests
        env:
          # Tests use in-memory SQLite via conftest.py — no real DB needed in CI
          DATABASE_URL: sqlite+aiosqlite:///:memory:
          SECRET_KEY: test-secret-key-for-ci-only-not-real
          ENVIRONMENT: test
        run: pytest tests/ -v --tb=short

  frontend:
    name: Frontend — Type Check, Lint, Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Build
        env:
          NEXT_PUBLIC_API_URL: https://api.example.com
          NEXT_PUBLIC_SUPABASE_URL: https://pmkvzwgizpropwjgpopp.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: npm run build
